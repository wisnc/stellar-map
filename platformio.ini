; Cardputer-Adv  (Stamp-S3A / ESP32-S3FN8 : 8MB flash, NO PSRAM)
; Star-map firmware build environment.

[env:cardputer-adv]
platform = espressif32@6.7.0
board    = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3FN8 has 8MB flash and no PSRAM. default_8MB gives a ~3.3MB app
; partition, which holds the in-flash star catalog (.rodata) with room to spare.
board_build.flash_size  = 8MB
board_upload.flash_size = 8MB
board_build.partitions  = default_8MB.csv

monitor_speed = 115200
upload_speed  = 1500000

build_flags =
    -DESP32S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    -O2

; M5Cardputer pulls in M5Unified + M5GFX (LovyanGFX). The Adv keyboard
; (TCA8418) and BMI270 are handled by the current library.
lib_deps =
    M5Cardputer=https://github.com/m5stack/M5Cardputer
